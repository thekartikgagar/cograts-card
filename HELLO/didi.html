<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Congrats Card</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #ffd6e7, #ffe6f0);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    width: 300px;
    height: 200px;
    position: relative;
    perspective: 1000px;
}

/* Doors */
.door {
    position: absolute;
    width: 50%;
    height: 100%;
    background: #ffb6c1;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 2s ease-in-out;
}

/* Left */
.left {
    left: 0;
    transform-origin: left;
}

/* Right */
.right {
    right: 0;
    transform-origin: right;
}

/* Open */
.card.open .left {
    transform: rotateY(-120deg);
}

.card.open .right {
    transform: rotateY(120deg);
}

/* Inside */
.inside {
    position: absolute;
    width: 100%;
    height: 100%;
    background: #fff0f5;
    border-radius: 15px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Button */
button {
    position: absolute;
    bottom: 40px;
    padding: 10px 20px;
    border: none;
    background: #ff69b4;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}
</style>

</head>
<body>

<div class="card" id="card">

    <div class="inside">
        <h2>Congratulations DHATLO😁</h2>
        <img src="notfound.jpg"
        alt="TERI MERI PHOTO H YAHA BUT WOH FILE LOCATION TERI M NHI H TO DIKHEGI NHI"
        width="140">
    </div>

    <div class="door left">🎁</div>
    <div class="door right">🎁</div>

</div>

<button id="btn">Open Card</button>

<!-- Audio -->

<audio id="jetha" src="JETHA.mp3.mpeg"></audio>
<audio id="daya" src="DAYA.mp3.mpeg"></audio>

<script>
let clickCount = 0;
let isRunning = false;

const btn = document.getElementById("btn");
const bg = document.getElementById("bgmusic");
const jetha = document.getElementById("jetha");
const daya = document.getElementById("daya");
const card = document.getElementById("card");

btn.addEventListener("click", () => {

    if (isRunning) return; // prevent spam clicks

    clickCount++;

    // Start background music on FIRST interaction
    if (clickCount === 1) {
        bg.play().catch(() => {});
        return;
    }

    if (clickCount === 2) {
        isRunning = true;

        // Reset audio (important fix)
        jetha.currentTime = 0;

        jetha.play().then(() => {

            // Wait for audio end
            jetha.onended = () => {

                // Open gate
                card.classList.add("open");

                // After animation complete
                setTimeout(() => {
                    daya.currentTime = 0;
                    daya.play();
                }, 2000);

            };

        }).catch(() => {
            alert("Audio play nahi ho raha 😅 Check file paths");
        });
    }
});
</script>

</body>
</html>
